name: Android Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type when set_version is empty"
        type: choice
        options: [patch, minor, major]
        default: patch
      set_version:
        description: "Explicit semantic version X.Y.Z (optional)"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub release as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    # Avoid infinite loop when this workflow itself pushes version bump commit.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Sync with latest main
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin main

      - name: Bump Android version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.set_version || '' }}" ]]; then
            python3 scripts/bump_android_version.py --set-version "${{ github.event.inputs.set_version }}"
          else
            BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
            python3 scripts/bump_android_version.py --bump "$BUMP_TYPE"
          fi > version.env
          cat version.env
          cat version.env >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          if git diff --cached --quiet; then
            echo "No version changes detected after bump script."
            exit 0
          fi
          git commit -m "chore(release): bump app version to v${{ steps.bump.outputs.version_name }}"
          git push origin HEAD:main

      - name: Write runtime config from GitHub Secrets
        shell: bash
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_NATIVE_AD_UNIT_ID: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          ADMOB_NATIVE_FREQUENCY: ${{ secrets.ADMOB_NATIVE_FREQUENCY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
          CLOUDINARY_ACCOUNTS_JSON: ${{ secrets.CLOUDINARY_ACCOUNTS_JSON }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          AUDIO_BACKEND_BASE_URL: ${{ secrets.AUDIO_BACKEND_BASE_URL }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          {
            printf 'ADMOB_APP_ID=%s\n' "$ADMOB_APP_ID"
            printf 'ADMOB_NATIVE_AD_UNIT_ID=%s\n' "$ADMOB_NATIVE_AD_UNIT_ID"
            printf 'ADMOB_REWARDED_AD_UNIT_ID=%s\n' "$ADMOB_REWARDED_AD_UNIT_ID"
            printf 'ADMOB_NATIVE_FREQUENCY=%s\n' "${ADMOB_NATIVE_FREQUENCY:-7}"
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
            printf 'ALGOLIA_APP_ID=%s\n' "$ALGOLIA_APP_ID"
            printf 'ALGOLIA_SEARCH_KEY=%s\n' "$ALGOLIA_SEARCH_KEY"
            printf 'CLOUDINARY_ACCOUNTS_JSON=%s\n' "$CLOUDINARY_ACCOUNTS_JSON"
            printf 'GOOGLE_WEB_CLIENT_ID=%s\n' "$GOOGLE_WEB_CLIENT_ID"
            printf 'AUDIO_BACKEND_BASE_URL=%s\n' "$AUDIO_BACKEND_BASE_URL"
          } > secrets.properties
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: Write release signing config from GitHub Secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          mkdir -p keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore/release.jks
          {
            printf 'storeFile=keystore/release.jks\n'
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > release-signing.properties

      - name: Validate runtime config security
        run: python3 scripts/validate_config_security.py

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Create git tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.bump.outputs.version_name }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version_name }}
          name: EduSpecial v${{ steps.bump.outputs.version_name }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk

