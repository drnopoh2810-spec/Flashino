name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-test-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Write runtime config from GitHub Secrets
        shell: bash
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_NATIVE_AD_UNIT_ID: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          ADMOB_NATIVE_FREQUENCY: ${{ secrets.ADMOB_NATIVE_FREQUENCY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
          CLOUDINARY_ACCOUNTS_JSON: ${{ secrets.CLOUDINARY_ACCOUNTS_JSON }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          AUDIO_BACKEND_BASE_URL: ${{ secrets.AUDIO_BACKEND_BASE_URL }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          {
            printf 'ADMOB_APP_ID=%s\n' "$ADMOB_APP_ID"
            printf 'ADMOB_NATIVE_AD_UNIT_ID=%s\n' "$ADMOB_NATIVE_AD_UNIT_ID"
            printf 'ADMOB_REWARDED_AD_UNIT_ID=%s\n' "$ADMOB_REWARDED_AD_UNIT_ID"
            printf 'ADMOB_NATIVE_FREQUENCY=%s\n' "${ADMOB_NATIVE_FREQUENCY:-7}"
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
            printf 'ALGOLIA_APP_ID=%s\n' "$ALGOLIA_APP_ID"
            printf 'ALGOLIA_SEARCH_KEY=%s\n' "$ALGOLIA_SEARCH_KEY"
            printf 'CLOUDINARY_ACCOUNTS_JSON=%s\n' "$CLOUDINARY_ACCOUNTS_JSON"
            printf 'GOOGLE_WEB_CLIENT_ID=%s\n' "$GOOGLE_WEB_CLIENT_ID"
            printf 'AUDIO_BACKEND_BASE_URL=%s\n' "$AUDIO_BACKEND_BASE_URL"
          } > secrets.properties
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: Write release signing config from GitHub Secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore/release.jks
            {
              printf 'storeFile=keystore/release.jks\n'
              printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
              printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
              printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            } > release-signing.properties
          fi

      - name: Validate runtime config security
        run: python3 scripts/validate_config_security.py

      - name: Android lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verify release APK signature
        run: |
          if [ -f scripts/verify_release_signature.sh ]; then
            bash scripts/verify_release_signature.sh
          else
            echo "Skipping signature verification: script not found"
          fi

      - name: Upload lint and test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-reports-${{ github.run_id }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn

      - name: Upload APK artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.run_id }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        run: |
          ./gradlew :app:sonar \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN"
