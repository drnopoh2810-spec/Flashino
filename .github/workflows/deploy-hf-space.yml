name: Deploy Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "server/hf_audio_service/**"
      - ".github/workflows/deploy-hf-space.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Hugging Face token
        id: hf-token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HF_TOKEN secret is not configured; skipping Hugging Face Space deployment."
          fi

      - name: Checkout
        if: steps.hf-token.outputs.present == 'true'
        uses: actions/checkout@v4

      - name: Install Hugging Face CLI
        if: steps.hf-token.outputs.present == 'true'
        run: python -m pip install --upgrade "huggingface_hub[cli]"

      - name: Upload Space
        if: steps.hf-token.outputs.present == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload nopoh22/eduspecial-audio-service server/hf_audio_service \
            --repo-type space \
            --commit-message "Deploy update endpoint from GitHub Actions"
